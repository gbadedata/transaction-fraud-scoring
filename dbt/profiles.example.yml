# Copy to ~/.dbt/profiles.yml (or set DBT_PROFILES_DIR to this folder).
# Values default to the docker-compose Postgres service.
fraud:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('PGHOST', 'localhost') }}"
      port: "{{ env_var('PGPORT', '5432') | int }}"
      user: "{{ env_var('PGUSER', 'fraud') }}"
      password: "{{ env_var('PGPASSWORD', 'fraud') }}"
      dbname: "{{ env_var('PGDATABASE', 'fraud') }}"
      schema: analytics
      threads: 4
