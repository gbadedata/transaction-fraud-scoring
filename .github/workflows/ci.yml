name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest -q

  # Promote to a real gate once you check in a baseline: train on a fixed seed and
  # fail the build if PR-AUC on the holdout drops below an agreed floor. Keeps model
  # regressions out of main the same way unit tests keep code regressions out.
  #
  # model-regression:
  #   runs-on: ubuntu-latest
  #   steps: [ ... train, compare PR-AUC to baseline, exit 1 if worse ... ]
